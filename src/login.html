<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>登录 - 科成开放原子开源社团</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="./css/theme.css">
</head>
<body>

<nav class="nav nav-scrolled" id="navbar">
  <div class="nav-inner">
    <a href="index.html" class="logo">
      <img src="../社团图标.jpg" alt="" class="nav-logo-img" onerror="this.style.display='none'">
      <span class="nav-logo-text">科成开源</span>
    </a>
    <div class="hamburger" id="hamburger"><span></span><span></span><span></span></div>
    <div class="links" id="navLinks">
      <a href="index.html" data-page="home" id="navHome">首页</a>
      <a href="about.html" data-page="about" id="navAbout">社团简介</a>
      <a href="news.html" data-page="news" id="navNews">新闻动态</a>
      <a href="projects.html" data-page="projects" id="navProjects">导航站</a>
      <a href="login.html" data-page="login" class="active" id="navLogin">登录</a>
      <div class="nav-ext">预留1</div>
      <div class="nav-ext">预留2</div>
    </div>
    <div class="ctrl">
      <div class="theme-toggle-wrap" title="切换主题">
        <button class="theme-toggle" id="themeBtn" onclick="toggleTheme()" aria-label="切换明暗主题" type="button">
          <div class="clouds"><div class="cloud c1"></div><div class="cloud c2"></div></div>
          <div class="stars"><div class="star s1"></div><div class="star s2"></div><div class="star s3"></div><div class="star s4"></div><div class="star s5"></div></div>
          <div class="toggle-orb"></div>
        </button>
      </div>
      <button class="lang-btn" onclick="toggleLang()" id="langBtn">EN</button>
    </div>
  </div>
</nav>

<main class="login-page">
  <div class="login-box an">
    <h2>管理员登录</h2>
    <p class="subtitle an d1">登录后管理社团申请记录</p>
    <form id="loginForm" onsubmit="handleLogin(event)">
      <label class="an d2">用户名</label>
      <input type="text" id="username" class="an d2" placeholder="请输入用户名" required>
      <label class="an d3">密码</label>
      <input type="password" id="password" class="an d3" placeholder="请输入密码" required>
      <div class="btns an d4">
        <button type="submit">登录</button>
      </div>
    </form>
  </div>
</main>

<footer class="footer">
  <div class="footer-inner">
    <div class="footer-brand">
      <a href="admin.html">科成开放原子开源社团 · 因开放而精彩，因开源而未来</a>
      <p class="copyright">© 2026 电子科技大学成都学院开放原子开源社团 版权所有</p>
    </div>
  </div>
</footer>

<script src="./js/theme.js"></script>
<script src="./js/main.js"></script>
<script>
function handleLogin(e) {
  e.preventDefault();
  const username = document.getElementById('username').value;
  const password = document.getElementById('password').value;

  if (username === 'admin' && password === 'admin123') {
    sessionStorage.setItem('isAdmin', 'true');
    location.href = 'admin.html';
  } else {
    alert('用户名或密码错误');
  }
}
</script>
</body>
</html>
