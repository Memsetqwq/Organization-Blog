<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title id="loginTitle">登录 - 科成开放原子开源社团</title>
<link rel="icon" type="image/jpeg" href="../社团图标.jpg">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="./css/theme.css">
</head>
<body>

<nav class="nav nav-scrolled" id="navbar">
  <div class="nav-inner">
    <a href="index.html" class="logo">
      <img src="../社团图标.jpg" alt="" class="nav-logo-img" onerror="this.style.display='none'">
      <span class="nav-logo-text">科成开源</span>
    </a>
    <div class="hamburger" id="hamburger"><span></span><span></span><span></span></div>
    <div class="links" id="navLinks">
      <a href="index.html" data-page="home" id="navHome">首页</a>
      <a href="about.html" data-page="about" id="navAbout">社团简介</a>
      <a href="news.html" data-page="news" id="navNews">新闻动态</a>
      <a href="projects.html" data-page="projects" id="navProjects">导航站</a>
      <a href="login.html" data-page="login" class="active" id="navLogin">登录</a>
    </div>
    <div class="ctrl">
      <div class="theme-toggle-wrap" title="切换主题">
        <button class="theme-toggle" id="themeBtn" onclick="toggleTheme()" aria-label="切换明暗主题" type="button">
          <div class="clouds"><div class="cloud c1"></div><div class="cloud c2"></div></div>
          <div class="stars"><div class="star s1"></div><div class="star s2"></div><div class="star s3"></div><div class="star s4"></div><div class="star s5"></div></div>
          <div class="toggle-orb"></div>
        </button>
      </div>
      <button class="lang-btn" onclick="toggleLang()" id="langBtn">EN</button>
    </div>
  </div>
</nav>

<main class="login-page">
  <div class="login-box an">
    <h2 id="loginH2">管理员登录</h2>
    <p class="subtitle an d1" id="loginSub">登录后管理社团申请记录</p>
    <form id="loginForm" onsubmit="handleLogin(event)">
      <label class="an d2" id="loginUserLabel">用户名</label>
      <input type="text" id="loginUser" class="an d2" placeholder="请输入用户名" required>
      <label class="an d3" id="loginPwdLabel">密码</label>
      <input type="password" id="loginPwd" class="an d3" placeholder="请输入密码" required>
      <div class="btns an d4">
        <button type="submit" id="loginBtn">登录</button>
      </div>
    </form>
  </div>
</main>

<footer class="footer" id="footer">
  <div class="footer-inner">
    <div class="footer-brand">
      <span id="footerDesc" style="color:inherit;text-decoration:none;">科成开放原子开源社团 · 因开放而精彩，因开源而未来</span>
      <p class="copyright">© 2026 电子科技大学成都学院开放原子开源社团 版权所有</p>
    </div>
    <div class="links">
      <button onclick="openJoin()" id="footerJoin">加入我们</button>
      <a href="https://github.com/CDUESTC-OpenAtom-Open-Source-Club" target="_blank" rel="noopener">GitHub</a>
      <div class="follow-us" id="followUs" onclick="toggleQrExpand()">
        <span class="follow-label" id="followLabel">关注我们</span>
        <div class="qr-wrapper">
          <img src="../社团微信公众号二维码.png" alt="微信公众号二维码" class="qr-code qr-small" onerror="this.src='data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><rect fill=%22%23161B22%22 width=%22100%22 height=%22100%22/><text x=%2250%22 y=%2255%22 text-anchor=%22middle%22 fill=%22%238B949E%22 font-size=%2212%22>二维码</text></svg>'">
          <div class="qr-expand-box">
            <img src="../社团微信公众号二维码.png" alt="微信公众号二维码" class="qr-code qr-large" onerror="this.src='data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><rect fill=%22%23161B22%22 width=%22100%22 height=%22100%22/><text x=%2250%22 y=%2255%22 text-anchor=%22middle%22 fill=%22%238B949E%22 font-size=%2212%22>二维码</text></svg>'">
          </div>
        </div>
      </div>
    </div>
  </div>
</footer>

<!-- BACK TO TOP -->
<button class="back-top" id="backTop" onclick="window.scrollTo({top:0,behavior:'smooth'})" title="回到顶部">↑</button>

<!-- JOIN MODAL -->
<div class="modal" id="joinModal">
  <div class="modal-box">
    <button class="close" onclick="closeJoin()">&times;</button>
    <h3 id="mTitle">加入科成开源社团</h3>
    <p class="subtitle" id="mSub">填写以下信息，我们将通过邮件与你联系</p>
    <label id="mNameLabel">姓名</label>
    <input type="text" id="mName" placeholder="请输入你的姓名">
    <label id="mEmailLabel">邮箱</label>
    <input type="email" id="mEmail" placeholder="your@email.com">
    <label id="mDeptLabel">意向部门</label>
    <select id="mDept">
      <option value="">请选择意向部门</option>
      <option value="projects">项目部 — 技术开发与开源项目维护</option>
      <option value="outreach">外联部 — 对外交流与企业合作对接</option>
      <option value="publicity">宣策部 — 品牌宣传与活动策划</option>
      <option value="org">组织部 — 日常管理与活动组织</option>
      <option value="admin">秘书处 — 行政管理与文档工作</option>
    </select>
    <label id="mMsgLabel">自我介绍 / 申请理由</label>
    <p class="hint" id="mHint">请介绍你的技术背景、感兴趣的领域（OpenHarmony / openEuler / OpenTenBase），以及为什么想加入我们。</p>
    <textarea id="mMsg" rows="5" placeholder="例如：我是计算机专业大二学生，对开源鸿蒙系统很感兴趣，希望通过社团学习分布式操作系统开发..."></textarea>
    <div class="btns">
      <button class="cn" onclick="closeJoin()" id="mCancel">取消</button>
      <button class="sb" onclick="submitJoin()" id="mSubmit">提交申请</button>
    </div>
  </div>
</div>

<script src="./js/theme.js"></script>
<script src="./js/db.js"></script>
<script src="./js/main.js"></script>
<script>
document.addEventListener('DOMContentLoaded',applyLang);
function handleLogin(e) {
  e.preventDefault();
  const loginUser = document.getElementById('loginUser').value;
  const loginPwd = document.getElementById('loginPwd').value;

  if (loginUser === 'admin' && loginPwd === 'admin123') {
    sessionStorage.setItem('isAdmin', 'true');
    location.href = 'admin.html';
  } else {
    const errMsg = document.getElementById('loginErr')?.textContent || '用户名或密码错误';
    alert(errMsg);
  }
}
</script>
<p class="login-error" id="loginErr" style="display:none">用户名或密码错误</p>
</body>
</html>
