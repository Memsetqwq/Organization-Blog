<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>管理员后台 - 科成开放原子开源社团</title>
<link rel="stylesheet" href="./css/theme.css">
<style>
  body { background: var(--bg); color: var(--text); min-height: 100vh; }
  .admin-container { max-width: 1200px; margin: 0 auto; padding: 40px 20px; }
  .admin-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 40px; padding-bottom: 20px; border-bottom: 1px solid var(--border); }
  .admin-header h1 { font-size: 28px; color: var(--text); }
  .admin-header .back-btn { padding: 10px 20px; background: var(--bg-2); border: 1px solid var(--border); border-radius: 8px; color: var(--text); text-decoration: none; cursor: pointer; }
  .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; margin-bottom: 40px; }
  .stat-card { background: var(--bg-2); border: 1px solid var(--border); border-radius: 12px; padding: 24px; text-align: center; }
  .stat-card .num { font-size: 48px; font-weight: 700; color: var(--accent); }
  .stat-card .label { font-size: 14px; color: var(--text-2); margin-top: 8px; }
  .filter-bar { display: flex; gap: 16px; margin-bottom: 20px; flex-wrap: wrap; }
  .filter-bar select, .filter-bar input { padding: 10px 14px; border: 1px solid var(--border); border-radius: 8px; background: var(--bg-2); color: var(--text); }
  .app-list { background: var(--bg-2); border: 1px solid var(--border); border-radius: 12px; overflow: hidden; }
  .app-item { display: grid; grid-template-columns: 1fr 1fr 1fr 120px; gap: 16px; padding: 20px; border-bottom: 1px solid var(--border); align-items: center; }
  .app-item:last-child { border-bottom: none; }
  .app-item:hover { background: var(--bg-3); }
  .app-info h3 { font-size: 16px; margin-bottom: 4px; }
  .app-info p { font-size: 13px; color: var(--text-2); }
  .app-email { color: var(--accent); font-size: 14px; }
  .app-dept { background: var(--bg); padding: 4px 12px; border-radius: 20px; font-size: 12px; }
  .app-date { font-size: 12px; color: var(--text-2); }
  .app-actions { display: flex; gap: 8px; }
  .app-actions button { padding: 6px 12px; border-radius: 6px; border: none; cursor: pointer; font-size: 12px; }
  .btn-delete { background: #dc3545; color: white; }
  .btn-view { background: var(--accent); color: white; }
  .empty-state { text-align: center; padding: 60px 20px; color: var(--text-2); }
  /* Login Modal */
  .login-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.7); display: flex; align-items: center; justify-content: center; z-index: 1000; }
  .login-box { background: var(--bg-2); border: 1px solid var(--border); border-radius: 16px; padding: 40px; width: 360px; }
  .login-box h2 { text-align: center; margin-bottom: 24px; }
  .login-box input { width: 100%; padding: 12px 16px; margin-bottom: 16px; border: 1px solid var(--border); border-radius: 8px; background: var(--bg); color: var(--text); box-sizing: border-box; }
  .login-box button { width: 100%; padding: 12px; background: var(--accent); color: white; border: none; border-radius: 8px; cursor: pointer; font-size: 16px; }
  .login-box button:hover { opacity: 0.9; }
  .login-error { color: #dc3545; text-align: center; margin-top: 12px; display: none; }
  /* Detail Modal */
  .detail-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.7); display: flex; align-items: center; justify-content: center; z-index: 1000; }
  .detail-box { background: var(--bg-2); border: 1px solid var(--border); border-radius: 16px; padding: 32px; width: 500px; max-height: 80vh; overflow-y: auto; }
  .detail-box h2 { margin-bottom: 20px; }
  .detail-row { display: flex; padding: 12px 0; border-bottom: 1px solid var(--border); }
  .detail-row:last-child { border-bottom: none; }
  .detail-label { width: 100px; color: var(--text-2); }
  .detail-value { flex: 1; word-break: break-all; }
  .detail-close { margin-top: 20px; width: 100%; padding: 12px; background: var(--bg); border: 1px solid var(--border); border-radius: 8px; cursor: pointer; }
  /* Confirm Modal */
  .confirm-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.7); display: flex; align-items: center; justify-content: center; z-index: 1001; }
  .confirm-box { background: var(--bg-2); border: 1px solid var(--border); border-radius: 16px; padding: 32px; width: 400px; text-align: center; }
  .confirm-box h3 { margin-bottom: 12px; }
  .confirm-box p { color: var(--text-2); margin-bottom: 24px; }
  .confirm-btns { display: flex; gap: 12px; }
  .confirm-btns button { flex: 1; padding: 12px; border-radius: 8px; cursor: pointer; border: none; }
  .confirm-yes { background: #dc3545; color: white; }
  .confirm-no { background: var(--bg); border: 1px solid var(--border) !important; color: var(--text); }
  @media (max-width: 768px) {
    .app-item { grid-template-columns: 1fr; gap: 12px; }
  }
</style>
</head>
<body>
<!-- Login Modal -->
<div class="login-overlay" id="loginOverlay">
  <div class="login-box" style="position:relative;">
    <button onclick="closeLoginModal()" style="position:absolute;top:12px;right:12px;background:none;border:none;font-size:24px;cursor:pointer;color:var(--text-2);width:32px;height:32px;display:flex;align-items:center;justify-content:center;">&times;</button>
    <h2>管理员登录</h2>
    <input type="text" id="username" placeholder="用户名" autocomplete="off">
    <input type="password" id="password" placeholder="密码" autocomplete="off" onkeydown="if(event.key==='Enter')handleLogin()">
    <button onclick="handleLogin()">登录</button>
    <p class="login-error" id="loginError">用户名或密码错误</p>
  </div>
</div>

<!-- Main Dashboard (hidden until logged in) -->
<div class="admin-container" id="dashboard" style="display:none">
  <div class="admin-header">
    <h1>申请管理后台</h1>
    <div style="display:flex;gap:12px;align-items:center;">
      <span id="adminUsername" style="color:var(--text-2);font-size:14px;"></span>
      <a href="index.html" class="back-btn">返回首页</a>
      <button class="back-btn" onclick="handleLogout()">退出登录</button>
    </div>
  </div>

  <div class="stats-grid" id="statsGrid">
    <div class="stat-card">
      <div class="num" id="statTotal">0</div>
      <div class="label">总申请数</div>
    </div>
    <div class="stat-card">
      <div class="num" id="statToday">0</div>
      <div class="label">今日新增</div>
    </div>
    <div class="stat-card">
      <div class="num" id="statProjects">0</div>
      <div class="label">项目部</div>
    </div>
    <div class="stat-card">
      <div class="num" id="statOutreach">0</div>
      <div class="label">外联部</div>
    </div>
  </div>

  <div class="filter-bar">
    <select id="filterDept">
      <option value="">全部部门</option>
      <option value="projects">项目部</option>
      <option value="outreach">外联部</option>
      <option value="publicity">宣策部</option>
      <option value="org">组织部</option>
      <option value="admin">秘书处</option>
    </select>
    <input type="text" id="searchEmail" placeholder="搜索邮箱...">
    <button class="back-btn" onclick="loadApplications()">搜索</button>
    <button class="back-btn" onclick="exportData()">导出 CSV</button>
  </div>

  <div class="app-list" id="appList">
    <div class="empty-state">加载中...</div>
  </div>
</div>

<!-- Detail Modal -->
<div class="detail-overlay" id="detailOverlay" style="display:none">
  <div class="detail-box">
    <h2>申请详情</h2>
    <div id="detailContent"></div>
    <button class="detail-close" onclick="closeDetail()">关闭</button>
  </div>
</div>

<!-- Confirm Modal -->
<div class="confirm-overlay" id="confirmOverlay" style="display:none">
  <div class="confirm-box">
    <h3>确认删除</h3>
    <p>确定要删除这条申请记录吗？</p>
    <div class="confirm-btns">
      <button class="confirm-yes" onclick="confirmDelete()">删除</button>
      <button class="confirm-no" onclick="closeConfirm()">取消</button>
    </div>
  </div>
</div>

<script src="./js/theme.js"></script>
<script src="./js/db.js"></script>
<script>
(function() {
  'use strict';

  let currentUser = null;
  let deleteTargetId = null;
  const deptNames = {projects:'项目部',outreach:'外联部',publicity:'宣策部',org:'组织部',admin:'秘书处','':'未选择'};

  // Check if already logged in
  function checkAuth() {
    const session = sessionStorage.getItem('cduestc_admin_session');
    if (session) {
      currentUser = JSON.parse(session);
      showDashboard();
    }
  }

  // Login handler
  window.handleLogin = function() {
    const username = document.getElementById('username').value.trim();
    const password = document.getElementById('password').value;
    if (!username || !password) return;

    const valid = DB.verifyAdmin(username, password);
    if (valid) {
      currentUser = { username };
      sessionStorage.setItem('cduestc_admin_session', JSON.stringify(currentUser));
      document.getElementById('loginOverlay').style.display = 'none';
      showDashboard();
    } else {
      document.getElementById('loginError').style.display = 'block';
    }
  };

  // Cancel login - just close modal
  window.closeLoginModal = function() {
    document.getElementById('loginOverlay').style.display = 'none';
  };

  // Logout handler
  window.handleLogout = function() {
    currentUser = null;
    sessionStorage.removeItem('cduestc_admin_session');
    document.getElementById('dashboard').style.display = 'none';
    document.getElementById('loginOverlay').style.display = 'flex';
    document.getElementById('username').value = '';
    document.getElementById('password').value = '';
  };

  // ESC key to close login modal only
  document.addEventListener('keydown', function(e) {
    if (e.key === 'Escape') {
      const loginOverlay = document.getElementById('loginOverlay');
      if (loginOverlay && loginOverlay.style.display !== 'none') {
        closeLoginModal();
      }
    }
  });

  // Show dashboard
  function showDashboard() {
    document.getElementById('dashboard').style.display = 'block';
    document.getElementById('adminUsername').textContent = currentUser.username;
    loadApplications();
  }

  // Load applications
  function loadApplications() {
    const apps = DB.getAllApplications();
    renderStats(apps);
    renderList(apps);
  }

  // Render stats
  function renderStats(apps) {
    const stats = DB.getStats();
    document.getElementById('statTotal').textContent = stats.total;
    document.getElementById('statToday').textContent = stats.today;
    document.getElementById('statProjects').textContent = stats.departments.projects || 0;
    document.getElementById('statOutreach').textContent = stats.departments.outreach || 0;
  }

  // Render list
  function renderList(apps) {
    const filterDept = document.getElementById('filterDept').value;
    const searchEmail = document.getElementById('searchEmail').value.toLowerCase();

    let filtered = apps;
    if (filterDept) {
      filtered = filtered.filter(a => a.dept === filterDept);
    }
    if (searchEmail) {
      filtered = filtered.filter(a => a.email.toLowerCase().includes(searchEmail));
    }

    const container = document.getElementById('appList');
    if (filtered.length === 0) {
      container.innerHTML = '<div class="empty-state">暂无申请记录</div>';
      return;
    }

    container.innerHTML = filtered.map(app => `
      <div class="app-item">
        <div class="app-info">
          <h3>${escapeHtml(app.name)}</h3>
          <p class="app-date">${formatDate(app.createdAt)}</p>
        </div>
        <div class="app-email">${escapeHtml(app.email)}</div>
        <div><span class="app-dept">${deptNames[app.dept] || '未选择'}</span></div>
        <div class="app-actions">
          <button class="btn-view" onclick="viewDetail(${app.id})">查看</button>
          <button class="btn-delete" onclick="showDeleteConfirm(${app.id})">删除</button>
        </div>
      </div>
    `).join('');
  }

  // View detail
  window.viewDetail = function(id) {
    const apps = DB.getAllApplications();
    const app = apps.find(a => a.id === id);
    if (!app) return;

    const deptNamesEn = {projects:'Project Dept',outreach:'Outreach',publicity:'Publicity',org:'Organization',admin:'Secretariat','':'Not selected'};
    const dept = lang === 'zh' ? deptNames[app.dept] : deptNamesEn[app.dept];

    document.getElementById('detailContent').innerHTML = `
      <div class="detail-row"><span class="detail-label">姓名</span><span class="detail-value">${escapeHtml(app.name)}</span></div>
      <div class="detail-row"><span class="detail-label">邮箱</span><span class="detail-value">${escapeHtml(app.email)}</span></div>
      <div class="detail-row"><span class="detail-label">意向部门</span><span class="detail-value">${dept}</span></div>
      <div class="detail-row"><span class="detail-label">申请理由</span><span class="detail-value">${escapeHtml(app.message)}</span></div>
      <div class="detail-row"><span class="detail-label">提交时间</span><span class="detail-value">${formatDateTime(app.createdAt)}</span></div>
    `;
    document.getElementById('detailOverlay').style.display = 'flex';
  };

  // Close detail
  window.closeDetail = function() {
    document.getElementById('detailOverlay').style.display = 'none';
  };

  // Show delete confirm
  window.showDeleteConfirm = function(id) {
    deleteTargetId = id;
    document.getElementById('confirmOverlay').style.display = 'flex';
  };

  // Confirm delete
  window.confirmDelete = function() {
    if (deleteTargetId !== null) {
      DB.deleteApplication(deleteTargetId);
      deleteTargetId = null;
      loadApplications();
    }
    closeConfirm();
  };

  // Close confirm
  window.closeConfirm = function() {
    document.getElementById('confirmOverlay').style.display = 'none';
    deleteTargetId = null;
  };

  // Export CSV
  window.exportData = function() {
    const apps = DB.getAllApplications();
    const headers = ['姓名', '邮箱', '部门', '申请理由', '提交时间'];
    const rows = apps.map(app => [
      app.name, app.email, deptNames[app.dept] || '',
      app.message.replace(/\n/g, ' '), formatDateTime(app.createdAt)
    ]);
    const csv = [headers, ...rows].map(r => r.map(c => `"${c}"`).join(',')).join('\n');
    const blob = new Blob(['﻿' + csv], { type: 'text/csv;charset=utf-8' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = `applications_${Date.now()}.csv`;
    a.click();
    URL.revokeObjectURL(url);
  };

  // Helpers
  function escapeHtml(str) {
    if (!str) return '';
    return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  function formatDate(ts) {
    return new Date(ts).toLocaleDateString('zh-CN', {year:'numeric',month:'2-digit',day:'2-digit'});
  }

  function formatDateTime(ts) {
    return new Date(ts).toLocaleString('zh-CN', {year:'numeric',month:'2-digit',day:'2-digit',hour:'2-digit',minute:'2-digit'});
  }

  // Close modals on overlay click
  document.getElementById('loginOverlay').addEventListener('click', e => {
    if (e.target === document.getElementById('loginOverlay')) closeDetail();
  });
  document.getElementById('detailOverlay').addEventListener('click', e => {
    if (e.target === document.getElementById('detailOverlay')) closeDetail();
  });
  document.getElementById('confirmOverlay').addEventListener('click', e => {
    if (e.target === document.getElementById('confirmOverlay')) closeConfirm();
  });

  // Init
  document.addEventListener('DOMContentLoaded', checkAuth);
})();
</script>
</body>
</html>
