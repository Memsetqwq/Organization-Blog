<nav class="nav nav-scrolled" id="navbar">
  <div class="nav-inner">
    <a href="index.html" class="logo">

    </a>
    <div class="hamburger" id="hamburger"><span></span><span></span><span></span></div>
    <div class="links" id="navLinks">

      <a href="about.html" data-page="about" id="navAbout">社团简介</a>
      <a href="news.html" data-page="news" id="navNews">新闻动态</a>

      <div class="nav-ext">预留2</div>

    <div class="ctrl">

          <div class="clouds"><div class="cloud c1"></div><div class="cloud c2"></div></div>
          <div class="stars"><div class="star s1"></div><div class="star s2"></div><div class="star s3"></div><div class="star s4"></div><div class="star s5"></div></div>

  <div class="sec-head">
    <h1 class="an">导航站</h1>
    <p class="an d2">精选开源资源与技术链接</p>
  </div>

  <div class="links-grid" style="max-width:900px;margin:0 auto">
    <a href="https://www.openharmony.cn/" target="_blank" rel="noopener" class="link-card an d1">
      <div class="link-icon">📱</div>
      <h4>OpenHarmony</h4>
      <p>开源鸿蒙分布式操作系统官方网站</p>
    </a>
    <a href="https://www.openeuler.org/" target="_blank" rel="noopener" class="link-card an d2">
      <div class="link-icon">💻</div>
      <h4>openEuler</h4>
      <p>企业级Linux操作系统开源社区</p>
    </a>
    <a href="https://www.opentenbase.org/" target="_blank" rel="noopener" class="link-card an d3">
      <div class="link-icon">🗄️</div>
      <h4>OpenTenBase</h4>
      <p>腾讯开源数据库内核社区</p>
    </a>
    <a href="https://openatom.org/" target="_blank" rel="noopener" class="link-card an d4">
      <div class="link-icon">🏛️</div>

      <p>开源公益基金会官方网站</p>

    </a>
    <a href="https://gitee.com/cduestc-open-atom" target="_blank" rel="noopener" class="link-card an d6">
      <div class="link-icon">🐱</div>
      <h4>Gitee 仓库</h4>
      <p>社团开源项目代码仓库（国内镜像）</p>
    </a>
