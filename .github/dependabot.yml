version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 10
    commit-message:
      prefix: "deps"
    labels:
      - "dependencies"
    reviewers:
      - "@Memsetqwq"
    ignore:
      - dependency-name: "parcel"
        update-types: ["version-update:semver-major"]